services:
  db:
    image: postgres:15-alpine
    container_name: nutrisafe-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data 

  backend:
    build: .
    container_name: nutrisafe-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env 
    environment:
      DB_HOST: ${DB_HOST}
      DB_PASSWORD: ${DB_PASSWORD}

volumes:
  pgdata: